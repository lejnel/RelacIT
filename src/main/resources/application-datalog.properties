# RelacIT - Data Logging Configuration

# Local File Logging
datalog.local.basepath=./logs
datalog.local.maxsizemb=100
datalog.local.retentiondays=30

# JDBC Database Logging (PostgreSQL example)
# Uncomment and configure to enable
# datalog.jdbc.url=jdbc:postgresql://localhost:5432/plcdata
# datalog.jdbc.username=plcuser
# datalog.jdbc.password=yourpassword
# datalog.jdbc.batchsize=100
# datalog.jdbc.flushinterval=5000

# Supabase Cloud Logging
# Uncomment and configure to enable
# datalog.supabase.url=https://your-project.supabase.co
# datalog.supabase.apikey=your-anon-key
# datalog.supabase.table=plc_data
# datalog.supabase.batchsize=50
